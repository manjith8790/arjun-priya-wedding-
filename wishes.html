<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wishes — Arjun & Priya</title>
<link rel="stylesheet" href="style.css">
<style>
.wishes-layout { display:grid; grid-template-columns:1fr 1.6fr; gap:3rem; align-items:start; }

/* WRITE A WISH */
.wish-form-card {
  background:var(--ivory); border:1px solid rgba(201,168,76,.3);
  padding:2.5rem; position:sticky; top:80px;
}
.wf-title { font-family:'Cormorant Garamond',serif; font-size:1.8rem; font-weight:300; color:var(--maroon-deep); margin-bottom:.3rem; }
.wf-sub   { font-size:.85rem; color:var(--text-mid); margin-bottom:2rem; line-height:1.7; }

.wish-btn {
  width:100%; padding:1rem; margin-top:1rem;
  background:var(--maroon); border:1px solid var(--gold);
  color:var(--gold-light); font-family:'Cinzel',serif;
  font-size:.68rem; letter-spacing:.25em; text-transform:uppercase;
  cursor:pointer; transition:all .3s; display:flex; align-items:center; justify-content:center; gap:.5rem;
}
.wish-btn:hover:not(:disabled) { background:var(--maroon-deep); }
.wish-btn:disabled { opacity:.6; cursor:not-allowed; }

/* WISHES FEED */
.wishes-feed {}
.feed-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:2rem; }
.feed-title { font-family:'Cormorant Garamond',serif; font-size:2rem; font-weight:300; color:var(--maroon-deep); }
.wish-count { font-family:'Cinzel',serif; font-size:.65rem; letter-spacing:.15em; color:var(--gold); }

.wishes-list { display:flex; flex-direction:column; gap:1rem; }
.wish-card {
  background:var(--ivory); border:1px solid rgba(201,168,76,.2);
  padding:1.5rem 1.8rem; position:relative; transition:box-shadow .3s;
  animation: wishSlideIn .5s ease both;
}
@keyframes wishSlideIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }
.wish-card:hover { box-shadow:0 6px 20px rgba(107,26,26,.08); }
.wish-card::before { content:'❝'; position:absolute; top:.8rem; right:1.2rem; font-family:'Cormorant Garamond',serif; font-size:3rem; color:rgba(201,168,76,.12); line-height:1; }
.wc-text { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:1.05rem; line-height:1.8; color:var(--text-dark); margin-bottom:.8rem; }
.wc-meta { display:flex; align-items:center; gap:1rem; }
.wc-name { font-family:'Cinzel',serif; font-size:.65rem; letter-spacing:.12em; color:var(--maroon); text-transform:uppercase; }
.wc-time { font-size:.72rem; color:rgba(107,26,26,.4); }

.wishes-empty { text-align:center; padding:4rem 2rem; border:1px dashed rgba(201,168,76,.25); }
.wishes-empty p { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:1.1rem; color:var(--text-mid); line-height:1.8; }
.wishes-loading { text-align:center; padding:3rem; }
.wishes-loading p { font-family:'Cinzel',serif; font-size:.65rem; letter-spacing:.2em; color:var(--gold); }

.load-more-btn {
  width:100%; margin-top:1.5rem; padding:.9rem;
  background:transparent; border:1px solid rgba(201,168,76,.3);
  color:var(--maroon); font-family:'Cinzel',serif;
  font-size:.65rem; letter-spacing:.2em; text-transform:uppercase;
  cursor:pointer; transition:all .3s;
}
.load-more-btn:hover { background:var(--ivory-dark); }

.toast { position:fixed; bottom:2rem; right:2rem; z-index:999; background:var(--maroon); color:var(--gold-light); font-family:'Cinzel',serif; font-size:.72rem; letter-spacing:.1em; padding:1rem 1.5rem; border:1px solid var(--gold); transform:translateY(100px); opacity:0; transition:all .4s; }
.toast.show { transform:translateY(0); opacity:1; }
.toast.error { background:#3D0000; border-color:#cc4444; color:#ffaaaa; }

@media(max-width:900px){ .wishes-layout{grid-template-columns:1fr;} .wish-form-card{position:static;} }
</style>
</head>
<body>
<nav>
  <a href="index.html">Home</a>
  <a href="story.html">Our Story</a>
  <a href="events.html">Events</a>
  <a href="family.html">Family</a>
  <a href="menu.html">Menu</a>
  <a href="gallery.html">Gallery</a>
  <a href="venue.html">Venue</a>
  <a href="wishes.html" class="active">Wishes</a>
  <a href="rsvp.html">RSVP</a>
</nav>
<main>
  <div class="page-banner">
    <p class="page-tag">Guestbook</p>
    <h1 class="page-title">Blessings & <em>Wishes</em></h1>
    <div class="gold-rule"></div>
  </div>
  <div class="content">
    <div class="wishes-layout">

      <!-- WRITE FORM -->
      <div class="wish-form-card reveal-l">
        <div class="wf-title">Leave a Wish</div>
        <p class="wf-sub">Share your blessings for Arjun & Priya. Your words will be part of their wedding memory forever.</p>
        <div class="fg"><label>Your Name *</label><input type="text" id="w-name" placeholder="Ananya Suresh"></div>
        <div class="fg">
          <label>Your Wish *</label>
          <textarea id="w-wish" style="height:130px" placeholder="Wishing you both a lifetime of love, laughter, and filter kaapi…"></textarea>
        </div>
        <button class="wish-btn" id="wish-btn" onclick="postWish()">Post Your Wish ✦</button>
      </div>

      <!-- WISHES FEED -->
      <div class="wishes-feed reveal-r">
        <div class="feed-header">
          <div class="feed-title">All <em style="font-style:italic;color:var(--maroon)">Wishes</em></div>
          <div class="wish-count" id="wish-count">Loading…</div>
        </div>
        <div id="wishes-list">
          <div class="wishes-loading"><div class="spinner"></div><p style="margin-top:.8rem">Loading wishes…</p></div>
        </div>
        <button class="load-more-btn" id="load-more" onclick="loadMore()" style="display:none">Load More Wishes</button>
      </div>
    </div>
  </div>
</main>
<footer><div class="footer-names">Arjun & Priya</div><div class="footer-date">15 · 11 · 2025 · Chennai</div></footer>
<div class="toast" id="toast"></div>

<script type="module">
  import { supabase } from './supabase.js';

  const obs = new IntersectionObserver(es=>es.forEach(e=>e.isIntersecting&&e.target.classList.add('visible')),{threshold:0.1});
  document.querySelectorAll('.reveal,.reveal-l,.reveal-r').forEach(el=>obs.observe(el));

  const PAGE_SIZE = 10;
  let offset = 0;
  let totalCount = 0;

  function showToast(msg, isError=false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (isError ? ' error' : '');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 4000);
  }

  function timeAgo(dateStr) {
    const diff = Math.floor((Date.now() - new Date(dateStr)) / 1000);
    if (diff < 60)  return 'Just now';
    if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
    return new Date(dateStr).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
  }

  function renderWish(w) {
    return `
      <div class="wish-card">
        <div class="wc-text">${w.wish.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
        <div class="wc-meta">
          <span class="wc-name">— ${w.name.replace(/</g,'&lt;')}</span>
          <span class="wc-time">${timeAgo(w.created_at)}</span>
        </div>
      </div>`;
  }

  async function loadWishes(reset=false) {
    if (reset) { offset = 0; document.getElementById('wishes-list').innerHTML = '<div class="wishes-loading"><div class="spinner"></div><p style="margin-top:.8rem">Loading…</p></div>'; }

    const { data, error, count } = await supabase
      .from('wishes')
      .select('*', { count: 'exact' })
      .eq('approved', true)
      .order('created_at', { ascending: false })
      .range(offset, offset + PAGE_SIZE - 1);

    if (error) { document.getElementById('wishes-list').innerHTML = '<p style="color:red;text-align:center">Could not load wishes.</p>'; return; }

    totalCount = count || 0;
    document.getElementById('wish-count').textContent = `${totalCount} ${totalCount === 1 ? 'wish' : 'wishes'}`;

    const list = document.getElementById('wishes-list');
    if (reset) list.innerHTML = '';

    if (data.length === 0 && offset === 0) {
      list.innerHTML = `<div class="wishes-empty"><p>Be the first to leave a wish for the couple! ✨</p></div>`;
    } else {
      list.innerHTML += data.map(renderWish).join('');
    }

    offset += data.length;
    document.getElementById('load-more').style.display = offset < totalCount ? 'block' : 'none';
  }

  window.loadMore = () => loadWishes(false);

  window.postWish = async function() {
    const name = document.getElementById('w-name').value.trim();
    const wish = document.getElementById('w-wish').value.trim();

    if (!name) { showToast('Please enter your name.', true); return; }
    if (wish.length < 5) { showToast('Please write a proper wish!', true); return; }

    const btn = document.getElementById('wish-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Posting…';

    const { error } = await supabase.from('wishes').insert({ name, wish });

    if (error) {
      showToast('Could not post wish. Try again.', true);
      btn.disabled = false;
      btn.innerHTML = 'Post Your Wish ✦';
      return;
    }

    document.getElementById('w-name').value = '';
    document.getElementById('w-wish').value = '';
    btn.disabled = false;
    btn.innerHTML = 'Post Your Wish ✦';
    showToast('Your wish has been posted! 🎉');
    loadWishes(true);
  };

  // Real-time: refresh when someone posts
  supabase.channel('wishes-live')
    .on('postgres_changes', { event:'INSERT', schema:'public', table:'wishes' }, () => {
      loadWishes(true);
    })
    .subscribe();

  loadWishes(true);
</script>
</body>
</html>
